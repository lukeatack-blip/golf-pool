<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Golf Pool</title>
<meta name="theme-color" content="#083860">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Golf Pool">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #eef1f5;
    color: #083860;
    padding: 16px;
    padding-top: calc(16px + env(safe-area-inset-top));
    max-width: 600px;
    margin: 0 auto;
  }
  .header { text-align: center; margin-bottom: 16px; }
  .logo { display: block; width: min(300px, 78%); height: auto; margin: 0 auto; }
  .status { font-size: 12px; color: #d01828; margin-top: 8px; }
  .team {
    background: #ffffff;
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
    border: 1px solid #d8dee8;
    display: flex;
    align-items: stretch;
  }
  .team-left {
    background: #083860;
    color: #fff;
    padding: 12px 12px;
    display: flex;
    align-items: center;
    flex: 0 0 38%;
  }
  .name-wrap { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .team-name { font-size: 18px; font-weight: 600; line-height: 1.2; text-align: center; width: 100%; }
  .team-total { font-size: 20px; font-weight: 700; margin-left: 6px; }
  
  /* Modern Laurel Container styling, sized to integrate bold name */
  .laurel-container { width: 100%; height: auto; max-height: 60px; display: block; }
  .laurel-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 22px; font-weight: 800; fill: #ffffff; letter-spacing: -0.5px; }

  .pile { font-size: 15px; flex-shrink: 0; line-height: 1; }
  .golfers {
    flex: 1;
    padding: 6px 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .golfer { display: flex; align-items: center; padding: 4px 0; font-size: 14px; }
  .golfer-name { flex: 1; color: #2c3e50; }
  .golfer-thru { width: 44px; text-align: center; color: #8a9bb0; font-size: 12px; }
  .golfer-score { width: 40px; text-align: right; font-weight: 600; }
  .neg { color: #d01828; }
  .pos { color: #5a6b85; }
  .even { color: #5a6b85; }
  .team-left .pos, .team-left .even { color: #fff; }
  .team-left .neg { color: #ff5c5c; }
  .refresh-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: #083860;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    margin-top: 8px;
    cursor: pointer;
  }
  .refresh-btn:active { opacity: 0.7; }
  .loading { text-align: center; color: #8a9bb0; padding: 20px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="header">
    <img class="logo" src="./us-open-logo.png" alt="US Open">
    <div class="status" id="status" hidden></div>
  </div>

  <div id="standings">
    <div class="loading">Loading standings...</div>
  </div>

  <button class="refresh-btn" onclick="loadData()">Refresh Now</button>

<script>
  var EXEC_URL = 'https://script.google.com/macros/s/AKfycbxngbFqVZH8OYTTcKmFBCV3wg8STg9KCj83camiH9R0kERdwFm_o5FtAzJoq6rcCDNp/exec';

  var hasData = false;

  // New precise SVG construction based directly on the organic, bold fill and precise structure of image_1.png
  function getLaurelSvg(name) {
    return '<svg class="laurel-container" viewBox="0 0 160 80" xmlns="http://www.w3.org/2000/svg">' +
      '<g fill="#e6a100">' +
        // Left Laurel branch - Bold fill, organic shape matching reference exactly
        '<path d="M53.7,66.7 C44.1,64.2 36.8,55 34.2,41.2 C32.1,30.8 34.8,19.2 40.9,9.2 L38.7,7.2 C32,18.5 28.8,31.2 31.1,42.1 C34,56.6 42.3,66.4 53.3,69 Z"/>' +
        '<path d="M37.9,19 C33.7,21.5 31.3,25.5 31.6,28.8 C33.3,28.4 36,25.8 38,22.2 Z"/>' +
        '<path d="M33,29.3 C28.6,32 25.7,36.7 26.3,40 C28,39.3 31,36 33,32.3 Z"/>' +
        '<path d="M31.3,40.7 C26.7,43.1 23.7,48.7 24,52 C26,51.3 29,47.3 31,43.3 Z"/>' +
        '<path d="M32.7,51.7 C28,54.7 25.3,60 26,63.3 C27.7,62.4 30.7,58 32.4,54.4 Z"/>' +
        '<path d="M40.7,14 C38,10.7 34.7,8.7 32.7,11 C33.3,13.7 36.4,16 39.3,16.7 Z"/>' +
        '<path d="M34,24 C30.7,20.7 26.7,19.3 24.7,21.6 C25.6,24.3 29,26 32,26.4 Z"/>' +
        '<path d="M29.3,35.3 C25.3,32.7 21.3,32 19.3,34.4 C20.7,37.1 24,38.4 27.3,38.4 Z"/>' +
        '<path d="M27.3,46.7 C23.3,44.7 19.3,44.7 17.3,47.4 C18.7,50.1 22.4,50.7 25.4,50.4 Z"/>' +
        // Right Laurel branch (Precise Mirrored coordinates)
        '<path d="M106.3,66.7 C115.9,64.2 123.2,55 125.8,41.2 C127.9,30.8 125.2,19.2 119.1,9.2 L121.3,7.2 C128,18.5 131.2,31.2 128.9,42.1 C126,56.6 117.7,66.4 106.7,69 Z"/>' +
        '<path d="M122.1,19 C126.3,21.5 128.7,25.5 128.4,28.8 C126.7,28.4 124,25.8 122,22.2 Z"/>' +
        '<path d="M127,29.3 C131.4,32 134.3,36.7 133.7,40 C132,39.3 129,36 127,32.3 Z"/>' +
        '<path d="M128.7,40.7 C133.3,43.1 136.3,48.7 136,52 C134,51.3 131,47.3 129,43.3 Z"/>' +
        '<path d="M127.3,51.7 C132,54.7 134.7,60 134,63.3 C132.3,62.4 129.3,58 127.6,54.4 Z"/>' +
        '<path d="M119.3,14 C122,10.7 125.3,8.7 127.3,11 C126.7,13.7 123.6,16 120.7,16.7 Z"/>' +
        '<path d="M126,24 C129.3,20.7 133.3,19.3 135.3,21.6 C134.4,24.3 131,26 128,26.4 Z"/>' +
        '<path d="M130.7,35.3 C134.7,32.7 138.7,32 140.7,34.4 C139.3,37.1 136,38.4 132.7,38.4 Z"/>' +
        '<path d="M132.7,46.7 C136.7,44.7 140.7,44.7 142.7,47.4 C141.3,50.1 137.6,50.7 134.6,50.4 Z"/>' +
      '</g>' +
      // Dynamic Text Placement centered perfectly, with larger font size and heavy weight (font-weight: 800)
      '<text x="80" y="47" text-anchor="middle" class="laurel-text">' + name + '</text>' +
    '</svg>';
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  type = "text/javascript"
  function fmtScore(s) {
    var n = Number(s);
    if (isNaN(n) || s === '' || s === null) return { text: esc(s), cls: 'even' };
    if (n > 0) return { text: '+' + n, cls: 'pos' };
    if (n < 0) return { text: String(n), cls: 'neg' };
    return { text: 'E', cls: 'even' };
  }

  function render(data) {
    if (data.error) {
      document.getElementById('standings').innerHTML =
        '<div class="loading">Error: ' + esc(data.error) + '</div>';
      return;
    }

    var firstTotal = data.teams[0] ? Number(data.teams[0].total) : null;
    var lastIdx = data.teams.length - 1;
    var lastTotal = data.teams[lastIdx] ? Number(data.teams[lastIdx].total) : null;

    var html = '';
    data.teams.forEach(function(team, idx) {
      var totalFmt = fmtScore(team.total);
      var nameInner;
      
      if (Number(team.total) === firstTotal) {
        // Leader gets the precise dynamic SVG laurels based on image_1.png with their name rendered boldly inside.
        nameInner = getLaurelSvg(esc(team.name));
      } else if (Number(team.total) === lastTotal) {
        nameInner = '<span class="pile">&#128169;</span><div class="team-name">' + esc(team.name) + '</div><span class="pile">&#128169;</span>';
      } else {
        nameInner = '<div class="team-name">' + esc(team.name) + '</div>';
      }
      
      html += '<div class="team">';
      html += '  <div class="team-left">';
      html += '    <div class="name-wrap">' + nameInner + '</div>';
      html += '    <div class="team-total ' + totalFmt.cls + '">' + totalFmt.text + '</div>';
      html += '  </div>';
      html += '  <div class="golfers">';
      team.golfers.forEach(function(g) {
        var gs = fmtScore(g.score);
        var thru = g.thru ? esc(g.thru) : '';
        html += '<div class="golfer">';
        html += '  <div class="golfer-name">' + esc(g.name) + '</div>';
        html += '  <div class="golfer-thru">' + thru + '</div>';
        html += '  <div class="golfer-score ' + gs.cls + '">' + gs.text + '</div>';
        html += '</div>';
      });
      html += '  </div>';
      html += '</div>';
    });

    document.getElementById('standings').innerHTML = html;
    hasData = true;
    document.getElementById('status').hidden = true;
  }

  function loadData() {
    if (EXEC_URL.indexOf('PASTE_YOUR') !== -1) {
      document.getElementById('standings').innerHTML =
        '<div class="loading">Setup needed: open index.html and paste your Apps Script /exec URL into the EXEC_URL line near the top of the script.</div>';
      return;
    }
    fetch(EXEC_URL + '?api=1')
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(render)
      .catch(function() {
        var st = document.getElementById('status');
        if (hasData) {
          st.textContent = 'Offline. Showing last loaded scores.';
          st.hidden = false;
        } else {
          document.getElementById('standings').innerHTML =
            '<div class="loading">Can\'t load scores right now. Check your connection, then tap Refresh Now.</div>';
        }
      });
  }

  loadData();
  setInterval(loadData, 60000);
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) loadData();
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
