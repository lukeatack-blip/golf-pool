<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Golf Pool</title>
<meta name="theme-color" content="#083860">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Golf Pool">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #eef1f5;
    color: #083860;
    padding: 16px;
    padding-top: calc(16px + env(safe-area-inset-top));
    max-width: 600px;
    margin: 0 auto;
  }
  .header { text-align: center; margin-bottom: 16px; }
  .logo { display: block; width: min(300px, 78%); height: auto; margin: 0 auto; }
  .status { font-size: 12px; color: #d01828; margin-top: 8px; }
  .team {
    background: #ffffff;
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
    border: 1px solid #d8dee8;
    display: flex;
    align-items: stretch;
  }
  .team-left {
    background: #083860;
    color: #fff;
    padding: 12px 12px;
    display: flex;
    align-items: center;
    flex: 0 0 38%;
  }
  .name-wrap { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .team-name { font-size: 18px; font-weight: 600; line-height: 1.2; text-align: center; width: 100%; }
  .team-total { font-size: 20px; font-weight: 700; margin-left: 6px; }
  
  /* Modern Laurel Container styling */
  .laurel-container { width: 100%; height: auto; max-height: 55px; display: block; }
  .laurel-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; font-weight: 700; fill: #ffffff; }

  .pile { font-size: 15px; flex-shrink: 0; line-height: 1; }
  .golfers {
    flex: 1;
    padding: 6px 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .golfer { display: flex; align-items: center; padding: 4px 0; font-size: 14px; }
  .golfer-name { flex: 1; color: #2c3e50; }
  .golfer-thru { width: 44px; text-align: center; color: #8a9bb0; font-size: 12px; }
  .golfer-score { width: 40px; text-align: right; font-weight: 600; }
  .neg { color: #d01828; }
  .pos { color: #5a6b85; }
  .even { color: #5a6b85; }
  .team-left .pos, .team-left .even { color: #fff; }
  .team-left .neg { color: #ff5c5c; }
  .refresh-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: #083860;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    margin-top: 8px;
    cursor: pointer;
  }
  .refresh-btn:active { opacity: 0.7; }
  .loading { text-align: center; color: #8a9bb0; padding: 20px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="header">
    <img class="logo" src="./us-open-logo.png" alt="US Open">
    <div class="status" id="status" hidden></div>
  </div>

  <div id="standings">
    <div class="loading">Loading standings...</div>
  </div>

  <button class="refresh-btn" onclick="loadData()">Refresh Now</button>

<script>
  var EXEC_URL = 'https://script.google.com/macros/s/AKfycbxngbFqVZH8OYTTcKmFBCV3wg8STg9KCj83camiH9R0kERdwFm_o5FtAzJoq6rcCDNp/exec';

  var hasData = false;

  // This function builds a precise SVG pairing your exact laurel design with the leader's dynamic name centered
  function getLaurelSvg(name) {
    return '<svg class="laurel-container" viewBox="0 0 120 55" xmlns="http://www.w3.org/2000/svg">' +
      '<g fill="#e6a100">' +
        // Left Laurel branch
        '<path d="M40.3,50 C33,48.2 27.5,41.4 25.5,31 C24,23.3 26,14.6 30.6,7 L29,5.5 C24,14 21.6,23.5 23.3,31.7 C25.5,42.5 31.7,49.8 40,51.8 Z"/>' +
        '<path d="M28.4,14.2 C25.3,16 23.5,19 23.7,21.5 C25,21.2 27,19.2 28.5,16.5 Z"/>' +
        '<path d="M24.8,22 C21.5,24 19.3,27.5 19.7,30 C21,29.5 23.2,27 24.8,24.2 Z"/>' +
        '<path d="M23.5,30.5 C20,32.3 17.8,36.5 18,39 C19.5,38.5 21.8,35.5 23.3,32.5 Z"/>' +
        '<path d="M24.5,38.8 C21,41 19,45 19.5,47.5 C20.8,46.8 23,43.5 24.3,40.8 Z"/>' +
        '<path d="M30.5,10.5 C28.5,8 26,6.5 24.5,8.2 C25,10.2 27.3,12 29.5,12.5 Z"/>' +
        '<path d="M25.5,18 C23,15.5 20,14.5 18.5,16.2 C19.2,18.2 21.8,19.5 24,19.8 Z"/>' +
        '<path d="M22,26.5 C19,24.5 16,24 14.5,25.8 C15.5,27.8 18,28.8 20.5,28.8 Z"/>' +
        '<path d="M20.5,35 C17.5,33.5 14.5,33.5 13,35.5 C14,37.5 16.8,38 19,37.8 Z"/>' +
        // Right Laurel branch (Mirrored)
        '<path d="M79.7,50 C87,48.2 92.5,41.4 94.5,31 C96,23.3 94,14.6 89.4,7 L91,5.5 C96,14 98.4,23.5 96.7,31.7 C94.5,42.5 88.3,49.8 80,51.8 Z"/>' +
        '<path d="M91.6,14.2 C94.7,16 96.5,19 96.3,21.5 C95,21.2 93,19.2 91.5,16.5 Z"/>' +
        '<path d="M95.2,22 C98.5,24 100.7,27.5 100.3,30 C99,29.5 96.8,27 95.2,24.2 Z"/>' +
        '<path d="M96.5,30.5 C100,32.3 102.2,36.5 102,39 C100.5,38.5 98.2,35.5 96.7,32.5 Z"/>' +
        '<path d="M95.5,38.8 C99,41 101,45 100.5,47.5 C99.2,46.8 97,43.5 95.7,40.8 Z"/>' +
        '<path d="M89.5,10.5 C91.5,8 94,6.5 95.5,8.2 C95,10.2 92.7,12 90.5,12.5 Z"/>' +
        '<path d="M94.5,18 C97,15.5 100,14.5 101.5,16.2 C100.8,18.2 98.2,19.5 96,19.8 Z"/>' +
        '<path d="M98,26.5 C101,24.5 104,24 105.5,25.8 C104.5,27.8 102,28.8 99.5,28.8 Z"/>' +
        '<path d="M99.5,35 C102.5,33.5 105.5,33.5 107,35.5 C106,37.5 103.2,38 101,37.8 Z"/>' +
      '</g>' +
      // Dynamic Text Placement centered perfectly between branches
      '<text x="60" y="34" text-anchor="middle" class="laurel-text">' + name + '</text>' +
    '</svg>';
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  type = "text/javascript"
  function fmtScore(s) {
    var n = Number(s);
    if (isNaN(n) || s === '' || s === null) return { text: esc(s), cls: 'even' };
    if (n > 0) return { text: '+' + n, cls: 'pos' };
    if (n < 0) return { text: String(n), cls: 'neg' };
    return { text: 'E', cls: 'even' };
  }

  function render(data) {
    if (data.error) {
      document.getElementById('standings').innerHTML =
        '<div class="loading">Error: ' + esc(data.error) + '</div>';
      return;
    }

    var firstTotal = data.teams[0] ? Number(data.teams[0].total) : null;
    var lastIdx = data.teams.length - 1;
    var lastTotal = data.teams[lastIdx] ? Number(data.teams[lastIdx].total) : null;

    var html = '';
    data.teams.forEach(function(team, idx) {
      var totalFmt = fmtScore(team.total);
      var nameInner;
      
      if (Number(team.total) === firstTotal) {
        // First place gets the modern dynamic SVG laurels with the user's name rendered cleanly inside it
        nameInner = getLaurelSvg(esc(team.name));
      } else if (Number(team.total) === lastTotal) {
        nameInner = '<span class="pile">&#128169;</span><div class="team-name">' + esc(team.name) + '</div><span class="pile">&#128169;</span>';
      } else {
        nameInner = '<div class="team-name">' + esc(team.name) + '</div>';
      }
      
      html += '<div class="team">';
      html += '  <div class="team-left">';
      html += '    <div class="name-wrap">' + nameInner + '</div>';
      html += '    <div class="team-total ' + totalFmt.cls + '">' + totalFmt.text + '</div>';
      html += '  </div>';
      html += '  <div class="golfers">';
      team.golfers.forEach(function(g) {
        var gs = fmtScore(g.score);
        var thru = g.thru ? esc(g.thru) : '';
        html += '<div class="golfer">';
        html += '  <div class="golfer-name">' + esc(g.name) + '</div>';
        html += '  <div class="golfer-thru">' + thru + '</div>';
        html += '  <div class="golfer-score ' + gs.cls + '">' + gs.text + '</div>';
        html += '</div>';
      });
      html += '  </div>';
      html += '</div>';
    });

    document.getElementById('standings').innerHTML = html;
    hasData = true;
    document.getElementById('status').hidden = true;
  }

  function loadData() {
    if (EXEC_URL.indexOf('PASTE_YOUR') !== -1) {
      document.getElementById('standings').innerHTML =
        '<div class="loading">Setup needed: open index.html and paste your Apps Script /exec URL into the EXEC_URL line near the top of the script.</div>';
      return;
    }
    fetch(EXEC_URL + '?api=1')
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(render)
      .catch(function() {
        var st = document.getElementById('status');
        if (hasData) {
          st.textContent = 'Offline. Showing last loaded scores.';
          st.hidden = false;
        } else {
          document.getElementById('standings').innerHTML =
            '<div class="loading">Can\'t load scores right now. Check your connection, then tap Refresh Now.</div>';
        }
      });
  }

  loadData();
  setInterval(loadData, 60000);
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) loadData();
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
